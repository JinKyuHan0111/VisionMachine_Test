<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화재 감지 대시보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; }

  header {
    background: #1a1d27;
    padding: 16px 24px;
    border-bottom: 1px solid #2a2d3a;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  .live-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #4caf50; animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* 통계 카드 */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 10px;
    padding: 20px;
  }
  .stat-card .label { font-size: 0.78rem; color: #888; margin-bottom: 8px; }
  .stat-card .value { font-size: 2rem; font-weight: 700; }
  .stat-card.fire .value  { color: #ff6b35; }
  .stat-card.smoke .value { color: #aaa; }
  .stat-card.today .value { color: #64b5f6; }
  .stat-card.total .value { color: #81c784; }

  /* 메인 레이아웃 */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

  .panel {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 10px;
    padding: 20px;
  }
  .panel h2 {
    font-size: 0.9rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }

  /* 감지 목록 */
  .detection-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; }
  .detection-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: #12141c;
    border-radius: 8px;
    border-left: 3px solid transparent;
  }
  .detection-item.fire  { border-color: #ff6b35; }
  .detection-item.smoke { border-color: #888; }
  .badge {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    min-width: 52px;
    text-align: center;
  }
  .badge.fire  { background: #ff6b3522; color: #ff6b35; }
  .badge.smoke { background: #88888822; color: #bbb; }
  .det-info { flex: 1; }
  .det-source { font-size: 0.82rem; color: #ccc; }
  .det-time   { font-size: 0.72rem; color: #666; }
  .det-conf   { font-size: 0.82rem; color: #64b5f6; }

  /* 시간대별 차트 */
  .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 120px; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; }
  .bar {
    width: 100%;
    background: #ff6b3566;
    border-radius: 3px 3px 0 0;
    min-height: 2px;
    transition: height 0.3s;
  }
  .bar-label { font-size: 0.65rem; color: #666; }

  /* 캡처 이미지 그리드 */
  .capture-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    max-height: 320px;
    overflow-y: auto;
  }
  .capture-item img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .capture-item img:hover { opacity: 0.8; }
  .capture-item .cap-name { font-size: 0.65rem; color: #666; margin-top: 4px; word-break: break-all; }

  /* 필터 */
  .filter-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .filter-btn {
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid #2a2d3a;
    background: #12141c;
    color: #888;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.15s;
  }
  .filter-btn.active { background: #ff6b3522; border-color: #ff6b35; color: #ff6b35; }
  .filter-btn.active.smoke { background: #88888822; border-color: #888; color: #bbb; }

  /* 이미지 모달 */
  .modal {
    display: none;
    position: fixed; inset: 0;
    background: #000a;
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal.open { display: flex; }
  .modal img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
  .modal-close {
    position: absolute; top: 20px; right: 24px;
    font-size: 2rem; color: #fff; cursor: pointer;
  }

  .empty { color: #555; font-size: 0.85rem; text-align: center; padding: 24px; }
</style>
</head>
<body>

<header>
  <div class="live-dot"></div>
  <h1>화재 감지 대시보드</h1>
  <span style="margin-left:auto; font-size:0.8rem; color:#555;" id="last-updated"></span>
</header>

<div class="container">

  <!-- 통계 카드 -->
  <div class="stats-grid">
    <div class="stat-card today">
      <div class="label">오늘 감지</div>
      <div class="value" id="stat-today">-</div>
    </div>
    <div class="stat-card total">
      <div class="label">전체 감지</div>
      <div class="value" id="stat-total">-</div>
    </div>
    <div class="stat-card fire">
      <div class="label">오늘 화재</div>
      <div class="value" id="stat-fire">-</div>
    </div>
    <div class="stat-card smoke">
      <div class="label">오늘 연기</div>
      <div class="value" id="stat-smoke">-</div>
    </div>
  </div>

  <div class="main-grid">

    <!-- 최근 감지 목록 -->
    <div class="panel">
      <h2>최근 감지</h2>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
        <button class="filter-btn" onclick="setFilter('fire', this)">화재</button>
        <button class="filter-btn smoke" onclick="setFilter('smoke', this)">연기</button>
      </div>
      <div class="detection-list" id="detection-list">
        <div class="empty">데이터 로딩 중...</div>
      </div>
    </div>

    <!-- 시간대별 감지 차트 -->
    <div class="panel">
      <h2>오늘 시간대별 감지</h2>
      <div class="bar-chart" id="hourly-chart">
        <div class="empty">데이터 없음</div>
      </div>
    </div>

  </div>

  <!-- 캡처 이미지 -->
  <div class="panel">
    <h2>최근 캡처 이미지</h2>
    <div class="capture-grid" id="capture-grid">
      <div class="empty">캡처된 이미지 없음</div>
    </div>
  </div>

</div>

<!-- 이미지 모달 -->
<div class="modal" id="modal" onclick="closeModal()">
  <span class="modal-close">&times;</span>
  <img id="modal-img" src="">
</div>

<script>
let currentFilter = 'all';

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadDetections();
}

async function loadStats() {
  const res = await fetch('/api/stats');
  const data = await res.json();

  document.getElementById('stat-today').textContent = data.today ?? 0;
  document.getElementById('stat-total').textContent = data.total ?? 0;
  document.getElementById('stat-fire').textContent  = data.by_class?.fire  ?? 0;
  document.getElementById('stat-smoke').textContent = data.by_class?.smoke ?? 0;

  // 시간대별 차트
  const chart = document.getElementById('hourly-chart');
  if (!data.hourly || data.hourly.length === 0) {
    chart.innerHTML = '<div class="empty">오늘 감지 없음</div>';
    return;
  }
  const max = Math.max(...data.hourly.map(h => h.count), 1);
  chart.innerHTML = data.hourly.map(h => `
    <div class="bar-wrap">
      <div class="bar" style="height:${Math.max(h.count / max * 100, 2)}%"></div>
      <div class="bar-label">${h.hour}시</div>
    </div>
  `).join('');
}

async function loadDetections() {
  const url = currentFilter === 'all'
    ? '/api/detections?limit=30'
    : `/api/detections?limit=30&class_name=${currentFilter}`;
  const res = await fetch(url);
  const data = await res.json();

  const list = document.getElementById('detection-list');
  if (!data.length) {
    list.innerHTML = '<div class="empty">감지 기록 없음</div>';
    return;
  }
  list.innerHTML = data.map(d => {
    const t = d.timestamp ? d.timestamp.replace('T', ' ').slice(0, 19) : '';
    const conf = d.confidence ? (d.confidence * 100).toFixed(1) + '%' : '';
    return `
      <div class="detection-item ${d.class_name}">
        <span class="badge ${d.class_name}">${d.class_name}</span>
        <div class="det-info">
          <div class="det-source">${d.source || '알 수 없음'}</div>
          <div class="det-time">${t}</div>
        </div>
        <div class="det-conf">${conf}</div>
      </div>
    `;
  }).join('');
}

async function loadCaptures() {
  const res = await fetch('/api/captures?limit=16');
  const data = await res.json();

  const grid = document.getElementById('capture-grid');
  if (!data.length) {
    grid.innerHTML = '<div class="empty">캡처된 이미지 없음</div>';
    return;
  }
  grid.innerHTML = data.map(c => `
    <div class="capture-item">
      <img src="${c.url}" loading="lazy" onclick="openModal('${c.url}')" alt="${c.filename}">
      <div class="cap-name">${c.filename}</div>
    </div>
  `).join('');
}

function openModal(url) {
  document.getElementById('modal-img').src = url;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function updateTimestamp() {
  document.getElementById('last-updated').textContent =
    '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
}

async function refresh() {
  await Promise.all([loadStats(), loadDetections(), loadCaptures()]);
  updateTimestamp();
}

// 초기 로드 + 10초마다 자동 갱신
refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
